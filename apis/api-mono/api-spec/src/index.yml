openapi: "3.0.0"
info:
  version: "{{ packageJson('version') }}"
  title: "{{ packageJson('name') }}"

servers:
  - url: /api
    description: API endpoints (all routes prefixed with /api)

paths:
  $ref: paths/index.yml

components:
  parameters:
    $ref: components/parameters/index.yml
  schemas:
    $ref: components/schemas/index.yml

  {{
    inject([
    {
      toAllOperations: {
        content: {
          tags: [ '{{ autoTag() }}' ],
          summary: '{{ autoSummary() }}',
          operationId: '{{ uniqueOpId() }}',
          responses: {
            '200': {
              description: 'OK'
            },
            '400': {
              description: 'Bad Request'
            },
            '401': {
              description: 'Unauthorized'
            },
            '403': {
              description: 'Forbidden'
            },
            '406': {
              description: 'Not Acceptable'
            }
          }
        }
      }
    },
    {
      toAllOperations: {
        includeOnlyPaths: [
          '/_admin/**'
        ],
        content: {
          'x-async-validators': [ 'isSuperAdmin' ],
          'x-passRequest': true
        }
      }
    },
    {
      toAllOperations: {
        excludePaths: [
          '/health'
        ],
        content: {
          'x-permission': '{{ routePermission( {removeMethod: true} ) }}'
        }
      }
    },
    {
      toAllOperations: {
        excludePaths: [
          '/health',
          '/_admin/**'
        ],
        content: {
          'x-async-validators': [ 'companyCheck' ],
          'x-passRequest': true
        }
      }
    },
    {
      toAllOperations: {
        includeMethods: ['post', 'patch'],
        content: {
          responses: {
            '422': {
              description: 'Not Acceptable'
            }
          }
        }
      }
    }
  ])
}}
