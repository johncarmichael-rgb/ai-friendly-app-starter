allOf:
  - $ref: ./baseAttributes.yml
  - type: object
    required:
      - _id
      - invitedBy
      - invitedAt
      - status
      - createdAt
      - updatedAt
    properties:
      _id:
        type: string
      invitedBy:
        type: string
        description: User ID who invited this member
      invitedAt:
        type: string
        format: date-time
      joinedAt:
        type: string
        format: date-time
      status:
        $ref: ./status/enum.yml
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      isExternal:
        type: boolean
        description: Whether this member was provisioned with an external (non-company-domain) email address
        default: false
