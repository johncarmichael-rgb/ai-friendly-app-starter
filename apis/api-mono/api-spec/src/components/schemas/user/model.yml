allOf:
  - $ref: ./baseAttributes.yml
  - type: object
    required:
      - _id
      - createdAt
      - updatedAt
      - createdBy
      - roles
    properties:
      _id:
        type: string
      externalId:
        type: string
        description: External SSO provider user ID (Google, etc.)
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      createdBy:
        type: string
      previousEmails:
        type: array
        items:
          type: string
          format: email
        default: []
        description: Historical email addresses previously associated with this user (tracked when SSO email changes)
      roles:
        type: array
        items:
          type: string
        default: []
