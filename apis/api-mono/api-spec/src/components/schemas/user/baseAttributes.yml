type: object
required:
  - email
  - firstName
  - lastName
properties:
  email:
    type: string
    format: email
    description: User's email address (from SSO provider)
  firstName:
    type: string
    maxLength: 100
    description: User's first name
  lastName:
    type: string
    maxLength: 100
    description: User's last name
  displayName:
    type: string
    maxLength: 200
    description: Full display name (optional override)
  avatar:
    type: string
    format: uri
    description: URL to user's profile picture
