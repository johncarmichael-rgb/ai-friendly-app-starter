# WebSocket upgrade headers - use map for conditional Connection header
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name localhost 127.0.0.1;

  # Redirect all HTTP to HTTPS
  location / {
    return 301 https://$server_name$request_uri;
  }
}

server {
  listen 443 ssl;

  server_name localhost 127.0.0.1;

  ssl_certificate /etc/nginx/certs/localhost.pem;
  ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header Host $http_host;
  proxy_http_version 1.1;

  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  # Increased client timeout and max body
  client_body_timeout 300s;
  client_header_timeout 300s;
  client_max_body_size 100M;

  # Proxy timeout settings
  proxy_connect_timeout 300s;
  proxy_send_timeout 300s;
  proxy_read_timeout 300s;

  proxy_buffers 16 32k;
  proxy_buffer_size 64k;
  proxy_busy_buffers_size 64k;

  server_tokens off;
  #  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  #  add_header X-XSS-Protection "1; mode=block" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  proxy_hide_header X-Powered-By;

  if ($request_method ~ ^(TRACE|TRACK)$ ) {
    return 406;
  }

  location / {
    proxy_pass http://api-mono:8080/;

    # Cookie handling - pass cookies both ways
    proxy_set_header Cookie $http_cookie;
    proxy_pass_header Set-Cookie;

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket proxying — routes to the dedicated api-sockets service.
  # Path matches prod (load balancer → weave-apps-socket) so dev/prod parity
  # keeps the frontend free of env-specific socket-path branching.
  location /socket/socket-io/ {
    proxy_pass http://api-sockets:8081/socket/socket-io/;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_connect_timeout 7m;
    proxy_send_timeout 7m;
    proxy_read_timeout 7m;
    send_timeout 7m;
  }
}
